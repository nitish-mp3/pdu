name: PDU Outlet Guard
version: 0.2.4
slug: pdu_outlet_guard
description: Operator-first APC PDU control with discovery, outlet history, and remote-off locks.
url: https://github.com/nitish-mp3/pdu
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8023
panel_icon: mdi:power-socket-eu
panel_title: PDU Guard
host_network: true
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
options:
  pdu_hosts: []
  snmp_username: ""
  snmp_auth_password: ""
  snmp_priv_password: ""
  snmp_port: 161
schema:
  pdu_hosts:
    - str
  snmp_username: str
  snmp_auth_password: password
  snmp_priv_password: password
  snmp_port: port?
